name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 220.158.22.9
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/ameblo-tool
            git pull origin main
            npm install --production
            npm run build
            pm2 restart ameblo-tool
